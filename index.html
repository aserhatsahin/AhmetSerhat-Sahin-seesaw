<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Seesaw Simulation</title>
        <link rel="stylesheet" href="css/style.css">
        <script src="js/main.js" defer></script>
    </head>

    <body>

        <div id="mainContainer">

            <div id="infoPanel">
                <!-- left weight -->
                <!-- right weight -->

                <div class="infoItem" id="leftWeight">
                    <span class="infoLabel">LEFT WEIGHT</span>
                    <span class="infoValue">0 kg</span>
                </div>
                <div class="infoItem" id="rightWeight">
                    <span class="infoLabel">RIGHT WEIGHT</span>
                    <span class="infoValue">0 kg</span>
                </div>
                <div class="infoItem" id="nextWeight">
                    <span class="infoLabel">NEXT WEIGHT</span>
                    <span class="infoValue">0 kg</span>
                </div>
                <div class="infoItem" id="tiltAngle">
                    <span class="infoLabel">TILT ANGLE</span>
                    <span class="infoValue">0°</span>
                </div>





            </div>

            <!-- scene for the seesaw -->
            <div id="seesawContainer">


                <div id="completeSeesaw">

                    <div id="seesawPlank">

                    </div>
                    <div id="seesawPivot">

                    </div>
                </div>
            </div>

        </div>



    </body>

</html>
